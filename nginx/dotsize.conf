# DotSize Nginx 配置示例
# 将此文件放置在 /etc/nginx/sites-available/dotsize
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/dotsize /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 47.116.74.205;  # 阿里云服务器IP

    # HTTPS 配置（推荐）
    # listen 443 ssl http2;
    # ssl_certificate /etc/nginx/ssl/your-domain.com.pem;
    # ssl_certificate_key /etc/nginx/ssl/your-domain.com.key;

    # 根目录
    root /srv/nginx/html/dotsize;
    index index.html;

    # 日志
    access_log /var/log/nginx/dotsize_access.log;
    error_log /var/log/nginx/dotsize_error.log;

    # 主要路由 - SPA 应用需要将所有路由指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP 重定向到 HTTPS（如果启用 HTTPS）
